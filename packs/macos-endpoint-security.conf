{
  "platform": "darwin",
  "version": "1.0.0",
  "queries": {
    "es_process_events": {
      "query": "SELECT * FROM es_process_events;",
      "interval": 300,
      "description": "Process events from EndpointSecurity.",
      "removed": false
    },
    "es_process_file_events": {
      "query": "SELECT * FROM es_process_file_events;",
      "interval": 300,
      "description": "File events from EndpointSecurity.",
      "removed": false
    },
    "es_auth_failed_logins": {
      "query": "SELECT time, username, event_type, auth_type, path, description FROM es_authentication_events WHERE success = 0;",
      "interval": 300,
      "description": "Failed authentication attempts from EndpointSecurity.",
      "removed": false
    },
    "es_auth_ssh_logins": {
      "query": "SELECT time, username, ssh_login_username, remote_address, result_type, success FROM es_authentication_events WHERE event_type = 'openssh_login';",
      "interval": 300,
      "description": "SSH login attempts from EndpointSecurity.",
      "removed": false
    },
    "es_auth_sudo_usage": {
      "query": "SELECT time, username, sudo_command, success FROM es_authentication_events WHERE event_type = 'sudo';",
      "interval": 300,
      "description": "Sudo command usage from EndpointSecurity.",
      "removed": false
    },
    "es_auth_su_usage": {
      "query": "SELECT time, username, su_from_username, su_to_username, success FROM es_authentication_events WHERE event_type = 'su';",
      "interval": 300,
      "description": "Su command usage from EndpointSecurity.",
      "removed": false
    },
    "es_auth_screensharing": {
      "query": "SELECT time, username, event_type, screensharing_type, screensharing_viewer_app_path, remote_address FROM es_authentication_events WHERE event_type LIKE 'screensharing%';",
      "interval": 300,
      "description": "Screen sharing sessions from EndpointSecurity.",
      "removed": false
    },
    "es_security_high_severity": {
      "query": "SELECT time, event_type, category, description, pid, path, username FROM es_security_events WHERE severity = 'high' ORDER BY time DESC;",
      "interval": 300,
      "description": "High severity security events from EndpointSecurity.",
      "removed": false
    },
    "es_security_memory_protection": {
      "query": "SELECT time, event_type, pid, path, username, address, size, protection FROM es_security_events WHERE category = 'memory' ORDER BY time DESC;",
      "interval": 300,
      "description": "Memory protection events from EndpointSecurity.",
      "removed": false
    },
    "es_security_network_events": {
      "query": "SELECT time, event_type, pid, path, username, family, local_address, remote_address, local_port, remote_port FROM es_security_events WHERE category = 'network' ORDER BY time DESC;",
      "interval": 300,
      "description": "Network events from EndpointSecurity.",
      "removed": false
    },
    "es_security_kext_events": {
      "query": "SELECT time, event_type, pid, path, username, kext_path, kext_id, kext_version FROM es_security_events WHERE event_type IN ('kextload', 'kextunload') ORDER BY time DESC;",
      "interval": 300,
      "description": "Kernel extension load/unload events from EndpointSecurity.",
      "removed": false
    },
    "es_security_privilege_escalation": {
      "query": "SELECT time, event_type, pid, path, username, uid, euid, target_uid FROM es_security_events WHERE category = 'privilege' ORDER BY time DESC;",
      "interval": 300,
      "description": "Privilege escalation events from EndpointSecurity.",
      "removed": false
    }
  }
}